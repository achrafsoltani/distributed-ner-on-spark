name: CI smoke test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly cron catches transitive-dependency rot even if no commits land.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify top-level imports resolve
        run: |
          python - <<'PY'
          import importlib.util, sys
          mods = [
              "pandas", "pyarrow", "numpy", "duckdb", "sklearn",
              "transformers", "optimum", "spacy", "huggingface_hub",
              "matplotlib", "dotenv", "tqdm", "anthropic", "boto3",
          ]
          missing = [m for m in mods if importlib.util.find_spec(m) is None]
          if missing:
              print("MISSING:", missing); sys.exit(1)
          print(f"OK — {len(mods)} modules importable")
          PY

      - name: Compile-check pipeline scripts
        run: python -m compileall -q pipeline/

      - name: Read gold-set parquet artefacts
        run: |
          python - <<'PY'
          import pyarrow.parquet as pq
          for path in ["pipeline/training/haiku/gold.parquet",
                       "pipeline/training/sonnet/gold.parquet"]:
              tbl = pq.read_table(path)
              assert tbl.num_rows > 0, f"{path} is empty"
              cols = set(tbl.column_names)
              required = {"job_link", "job_summary", "entities"}
              missing = required - cols
              assert not missing, f"{path} missing columns {missing} (have {cols})"
              print(f"{path}: {tbl.num_rows} rows, columns={sorted(cols)}")
          PY
